name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        run: uv run pyinstaller MarkItDown.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          7z a -tzip "../MarkItDown-Windows.zip" "MarkItDown/*"
          echo "ASSET=MarkItDown-Windows.zip" >> $GITHUB_ENV

      - name: Package (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          zip -r "../MarkItDown-macOS.zip" "MarkItDown.app" "MarkItDown/"
          echo "ASSET=MarkItDown-macOS.zip" >> $GITHUB_ENV

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          zip -r "../MarkItDown-Linux.zip" "MarkItDown/"
          echo "ASSET=MarkItDown-Linux.zip" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
