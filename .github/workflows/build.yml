name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test
        run: uv run pytest -q

      - name: Build with PyInstaller
        run: uv run pyinstaller MarkItDown.spec --noconfirm

      - name: Set asset name
        id: vars
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "name=MarkItDown-Windows" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "name=MarkItDown-macOS" >> $GITHUB_OUTPUT
          else
            echo "name=MarkItDown-Linux" >> $GITHUB_OUTPUT
          fi

      - name: Package
        shell: bash
        run: |
          cd dist
          zip -r "../${{ steps.vars.outputs.name }}.zip" MarkItDown/ MarkItDown.app 2>/dev/null || zip -r "../${{ steps.vars.outputs.name }}.zip" MarkItDown/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.name }}
          path: ${{ steps.vars.outputs.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MarkItDown-Windows/MarkItDown-Windows.zip
            MarkItDown-macOS/MarkItDown-macOS.zip
            MarkItDown-Linux/MarkItDown-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
